name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "✅ Checking files exist..."
          test -f index.html && echo "index.html found" || exit 1
          test -f README.md && echo "README.md found" || exit 1
          test -f .gitignore && echo ".gitignore found" || exit 1
          echo "✅ All files present!"

      - name: Check HTML structure
        run: |
          grep -q "Python Mastery" index.html && echo "✅ Title found" || exit 1
          grep -q "showPhase" index.html && echo "✅ JS found" || exit 1
          grep -q "FastAPI" index.html && echo "✅ Content found" || exit 1
          echo "✅ HTML structure valid!"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4